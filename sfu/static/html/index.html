<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SFU Video Conference</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="join-screen">
  <h2>Join Conference</h2>
  <input type="text" id="nickname" placeholder="Your name" autocomplete="off">
  <input type="text" id="roomId" placeholder="Room ID" autocomplete="off">
  <button id="joinBtn">Join Room</button>
</div>
<div id="video-grid" style="display: none;">
  <div class="video-container">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="label">You</div>
  </div>
  <div id="remoteVideos"></div>
</div>
<div class="controls">
  <button id="startLatencyTestBtn">Test RTT (WebSocket)</button>
  <button id="toggleMicBtn">🎤 Mute Mic</button>
  <button id="toggleCamBtn">📷 Mute Camera</button>
</div>
<div id="latencyResult" class="stats-panel"></div>
<div id="webrtcStats" class="stats-panel">
  <pre>Collecting stats...</pre>
</div>

<script src="/static/js/client.js"></script>
</body>
</html>
