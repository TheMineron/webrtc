<!DOCTYPE html>
<html>
<head>
  <title>SFU Video Conference</title>
  <style>
      video {
          width: 300px;
          margin: 5px;
          background: black;
      }

      #videos {
          display: flex;
          flex-wrap: wrap;
      }

      .controls {
          margin: 10px;
      }
  </style>
</head>
<body>
<div class="controls">
  <input type="text" id="room" placeholder="Room name"/>
  <input type="text" id="nickname" placeholder="Your name"/>
  <button id="join">Join room</button>
  <button id="leave" disabled>Leave</button>
</div>
<div id="videos"></div>

<script>
    let signalingWs = null;
    let sfuWs = null;
    let pc = null;
    let localStream = null;
    let roomId = null;
    let participantId = null;
    let sfuUrl = null;

    const videosContainer = document.getElementById('videos');
    const videoElements = {};

    function addVideoElement(participantId, stream, isLocal = false) {
        if (videoElements[participantId]) return;
        const video = document.createElement('video');
        video.id = `video-${participantId}`;
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        if (isLocal) video.muted = true;
        videosContainer.appendChild(video);
        videoElements[participantId] = video;
    }

    function removeVideoElement(participantId) {
        const video = videoElements[participantId];
        if (video) {
            video.remove();
            delete videoElements[participantId];
        }
    }

    async function connectSignaling(room, nickname) {
        return new Promise((resolve, reject) => {
            signalingWs = new WebSocket(`wss://${window.location.hostname}:8000/ws`);
            signalingWs.onopen = () => {
                signalingWs.send(JSON.stringify({
                    type: "join",
                    room: room,
                    nickname: nickname
                }));
            };
            signalingWs.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === "joined") {
                    roomId = msg.room;
                    participantId = msg.participant_id;
                    sfuUrl = msg.sfu_url;
                    resolve();
                } else if (msg.type === "participant_left") {
                    removeVideoElement(msg.participant_id);
                }
            };
            signalingWs.onerror = reject;
        });
    }

    async function connectSFU() {
        sfuWs = new WebSocket(sfuUrl);
        await new Promise((resolve, reject) => {
            sfuWs.onopen = resolve;
            sfuWs.onerror = reject;
        });

        sfuWs.send(JSON.stringify({
            type: "join",
            room: roomId,
            participant_id: participantId
        }));

        await new Promise((resolve) => {
            sfuWs.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === "ready") resolve();
            };
        });

        // Настройка PeerConnection
        pc = new RTCPeerConnection({
            iceServers: [
                {urls: 'stun:stun.l.google.com:19302'},
                {urls: 'stun:stun1.l.google.com:19302'},

                {
                    urls: [
                        'turn:178.154.213.197:3478?transport=udp',
                        'turn:178.154.213.197:3478?transport=tcp'
                    ],
                    username: 'webrtc',
                    credential: 'webrtc_password'
                }
            ]
        });

        pc.ontrack = (event) => {
            // Используем id потока как идентификатор участника
            let remoteId = event.streams[0]?.id || 'remote';
            if (!videoElements[remoteId]) {
                const stream = new MediaStream();
                stream.addTrack(event.track);
                addVideoElement(remoteId, stream);
            } else {
                videoElements[remoteId].srcObject.addTrack(event.track);
            }
        };

        // Локальные медиа (только видео для теста, можно включить и аудио)
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        for (const track of localStream.getTracks()) {
            pc.addTrack(track, localStream);
        }
        addVideoElement(participantId, localStream, true);

        // Первоначальный offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sfuWs.send(JSON.stringify({
            type: "offer",
            sdp: pc.localDescription.sdp,
            type_sdp: pc.localDescription.type
        }));

        // Обработка сообщений SFU
        sfuWs.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === "answer") {
                const answer = new RTCSessionDescription({sdp: msg.sdp, type: msg.type_sdp});
                if (pc.signalingState === 'have-local-offer') {
                    await pc.setRemoteDescription(answer);
                }
            } else if (msg.type === "renegotiate") {
                try {
                    const offer = new RTCSessionDescription({sdp: msg.sdp, type: msg.type_sdp});
                    if (pc.signalingState !== 'stable') {
                        await pc.setLocalDescription({type: 'rollback'});
                    }
                    await pc.setRemoteDescription(offer);
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    sfuWs.send(JSON.stringify({
                        type: "answer",
                        sdp: pc.localDescription.sdp,
                        type_sdp: pc.localDescription.type
                    }));
                } catch (err) {
                    console.error("Renegotiation error:", err);
                }
            } else if (msg.type === "pong") {
                // heartbeat
            }
        };

        // Heartbeat
        setInterval(() => {
            if (sfuWs && sfuWs.readyState === WebSocket.OPEN) {
                sfuWs.send(JSON.stringify({type: "ping"}));
            }
        }, 15000);
    }

    async function leaveRoom() {
        if (signalingWs) signalingWs.close();
        if (sfuWs) sfuWs.send(JSON.stringify({type: "leave"}));
        if (pc) pc.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('join').disabled = false;
        document.getElementById('leave').disabled = true;
        videosContainer.innerHTML = '';
        Object.keys(videoElements).forEach(k => delete videoElements[k]);
    }

    document.getElementById('join').onclick = async () => {
        const room = document.getElementById('room').value;
        const nickname = document.getElementById('nickname').value;
        if (!room || !nickname) {
            alert("Room and nickname required");
            return;
        }
        document.getElementById('join').disabled = true;
        document.getElementById('leave').disabled = false;
        try {
            await connectSignaling(room, nickname);
            await connectSFU();
        } catch (err) {
            console.error(err);
            alert("Connection failed");
            leaveRoom();
        }
    };
    document.getElementById('leave').onclick = () => leaveRoom();
</script>
</body>
</html>
