<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFU Video Conference</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="join-screen">
  <h2>Присоединиться к комнате</h2>
  <input type="text" id="nickname" placeholder="Ваше имя" required>
  <input type="text" id="roomId" placeholder="ID комнаты" value="test">
  <button id="joinBtn">Войти</button>
</div>

<div id="video-grid" style="display: none;">
  <div class="local-video-container">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="label">Вы (локально)</div>
  </div>
  <div id="remoteVideos"></div>
</div>

<div id="stats" style="display: none;">
  <h3>Статистика (экспериментальная)</h3>
  <pre id="statsLog"></pre>
</div>

<div id="metricsPanel">
  <h3>📊 Метрики качества</h3>
  <div id="latencyResult"></div>
  <div id="localStats">
    <div class="stat-label">📹 Локальная статистика (исходящий поток)</div>
    <pre id="localStatsContent">— ожидание данных —</pre>
  </div>
  <div id="webrtcStats">
    <div class="stat-label">🌐 Удалённые участники</div>
    <pre id="webrtcStatsContent">— нет соединений —</pre>
  </div>
</div>

<script src="/static/js/client.js">
</script>
</body>
</html>
